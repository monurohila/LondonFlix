<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Browse | LondonFlix</title><link rel="stylesheet" href="/assets/style.css"></head><body>
<nav class="nav"><a class="brand" href="/"><span class="logo-word">London<span>Flix</span></span><small>Powered by UFP Film Club</small></a><div class="navlinks"><a href="/browse">Browse</a><a href="/pricing">Pricing</a><button class="profile" data-login><span class="loginLabel">Login</span></button></div></nav>
<section class="browse-hero"><span class="eyebrow">LondonFlix Library</span><h1>Browse films, trailers and indie stories.</h1><p>Search by title, cast, genre, runtime, type, tag or London curation.</p><div class="tools"><input id="searchBox" class="input" placeholder="Search films, genre, tags, cast..."><select id="typeFilter" class="select"><option>All</option><option>Short Film</option><option>Full Movie</option><option>Web Series</option><option>Upcoming 2026 Trailer</option></select><select id="genreFilter" class="select"><option>All</option><option>Drama</option><option>Romance</option><option>Action</option><option>British</option><option>Premium</option><option>Trailer</option><option>2026</option></select></div></section>

<footer class="footer">LondonFlix demo catalogue. Replace content JSON to add more titles.</footer><div id="loginModal" class="modal"><form id="loginForm" class="modal-card"><h2>LondonFlix Demo Login</h2><input id="name" placeholder="Your name" required><button class="btn play" type="submit">Login Demo</button><button class="btn info" type="button" data-close>Close</button></form></div><div id="trailerModal" class="modal"><div class="modal-card trailer-modal"><button class="close-x" data-trailer-close>×</button><div id="trailerFrame" class="modal-player"></div></div></div><div id="toast" class="toast"></div><script src="/assets/app.js"></script></body></html>
